<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Car Price Prediction</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <script>

        const brandModels = {{ brand_models | tojson }};

        function updateModels() {

            const brand = document.getElementById("brand").value;

            const modelDropdown = document.getElementById("model");

            modelDropdown.innerHTML = "";

            brandModels[brand].forEach(function(model){

                let option = document.createElement("option");

                option.value = model;

                option.text = model;

                modelDropdown.appendChild(option);

            });

        }

        function selectBrand(brandName){

            document.getElementById("brand").value = brandName;

            updateModels();

        }

        window.onload = function(){

            updateModels();

        }

    </script>

</head>

<body>

    <div class="container">

        <!-- Logo -->

        <div class="logo-section">

            <img src="{{ url_for('static', filename='vt logo 1.png') }}"
                class="logo" >
                 <p> Vihara Tech Institute</p>

        </div>

        <!-- Title -->

        <h1 class="title">Car Price Prediction </h1>

        <form action="/predict" method="POST">

            <!-- Brand Section -->

            <div class="brand-container">

                <h2>Select Brand</h2>

                <div class="brand-grid">

                    <div class="brand-card"
                        onclick="selectBrand('Tesla')">

                        <img src="{{ url_for('static', filename='brands/tesla.jpg') }}">

                        <p>Tesla</p>

                    </div>

                    <div class="brand-card"
                        onclick="selectBrand('Audi')">

                        <img src="{{ url_for('static', filename='brands/audi.jpg') }}">

                        <p>Audi</p>

                    </div>

                    <div class="brand-card"
                        onclick="selectBrand('BMW')">

                        <img src="{{ url_for('static', filename='brands/bmw.jpg') }}">

                        <p>BMW</p>

                    </div>

                    <div class="brand-card"
                        onclick="selectBrand('Ford')">

                        <img src="{{ url_for('static', filename='brands/ford.jpg') }}">

                        <p>Ford</p>

                    </div>

                    <div class="brand-card"
                        onclick="selectBrand('Honda')">

                        <img src="{{ url_for('static', filename='brands/honda.jpg') }}">

                        <p>Honda</p>

                    </div>

                    <div class="brand-card"
                        onclick="selectBrand('Mercedes')">

                        <img src="{{ url_for('static', filename='brands/mercedes.jpg') }}">

                        <p>Mercedes</p>

                    </div>

                    <div class="brand-card"
                        onclick="selectBrand('Toyota')">

                        <img src="{{ url_for('static', filename='brands/toyota.jpg') }}">

                        <p>Toyota</p>

                    </div>

                </div>

                <select name="brand"
                    id="brand"
                    onchange="updateModels()">

                    <option value="Tesla">Tesla</option>
                    <option value="Audi">Audi</option>
                    <option value="BMW">BMW</option>
                    <option value="Ford">Ford</option>
                    <option value="Honda">Honda</option>
                    <option value="Mercedes">Mercedes</option>
                    <option value="Toyota">Toyota</option>

                </select>

            </div>


            <!-- Input Fields -->

            <div class="input-grid">

                <div class="input-box">

                    <label>Model</label>

                    <select name="model" id="model"></select>

                </div>


                <div class="input-box">

                    <label>Year</label>

                    <input type="number"
                        name="year"
                        placeholder="Enter Year">

                </div>


                <div class="input-box">

                    <label>Engine Size</label>

                    <input type="number"

                        name="engine_size"
                        placeholder="Engine Size">

                </div>


                <div class="input-box">

                    <label>Fuel Type</label>

                    <select name="fuel">

                        <option>Petrol</option>
                        <option>Diesel</option>
                        <option>Electric</option>
                        <option>Hybrid</option>

                    </select>

                </div>


                <div class="input-box">

                    <label>Transmission</label>

                    <select name="transmission">

                        <option>Manual</option>
                        <option>Automatic</option>

                    </select>

                </div>


                <div class="input-box">

                    <label>Mileage</label>

                    <input type="number"
                        name="mileage"
                        placeholder="Enter Mileage">

                </div>


                <div class="input-box">

                    <label>Condition</label>

                    <select name="condition">

                        <option>New</option>
                        <option>Used</option>
                        <option>Like New</option>

                    </select>

                </div>

            </div>


            <!-- Button -->

            <div class="button-section">

                <button type="submit">

                    Price Prediction

                </button>

            </div>


            <!-- Prediction -->

            <div class="prediction">

                {{ prediction_text }}

            </div>

        </form>


        <!-- Footer -->

        <div class="footer">

            <img src="{{ url_for('static', filename='Ramya.jpg') }}"
                class="profile">

            <h2>Kammari Ramya</h2>

            <p>Data Science Student</p>

        </div>

    </div>

</body>

</html>
